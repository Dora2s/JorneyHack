<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetGoodHack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #eee;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: #1a1a1a;
            padding: 30px 0;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        header h1 {
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 2px;
            color: #fff;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin: 30px 0;
        }

        .tab-btn {
            background: #222;
            border: 1px solid #444;
            color: #888;
            padding: 12px 25px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #333;
            color: #fff;
            border-color: #666;
        }

        .content-section {
            display: none;
            width: 90%;
            max-width: 1000px;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .content-section.active {
            display: flex;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 25px;
            width: 280px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            border-color: #555;
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 1.5em;
        }

        .dl-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #eee;
            color: #111;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
            transition: 0.2s;
        }

        .dl-btn:hover {
            background: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        footer {
            margin-top: 50px;
            color: #444;
            font-size: 0.8em;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>GetGoodHack</h1>
    </header>

    <div class="tabs">
        <div class="tab-btn active" onclick="openTab('so2')">STANDOFF 2</div>
        <div class="tab-btn" onclick="openTab('roblox')">ROBLOX</div>
    </div>

    <div id="so2" class="content-section active">
        <div class="card">
            <h3>Nerest</h3>
            <a href="nerest.zip" download class="dl-btn">
                <i class="fas fa-download"></i> DOWNLOAD
            </a>
        </div>
    </div>

    <div id="roblox" class="content-section">
        <div class="card">
            <h3>Xeno</h3>
            <a href="xeno.zip" download class="dl-btn">
                <i class="fas fa-download"></i> DOWNLOAD
            </a>
        </div>
        <div class="card">
            <h3>JJSploit</h3>
            <a href="jjsploit.zip" download class="dl-btn">
                <i class="fas fa-download"></i> DOWNLOAD
            </a>
        </div>
        <div class="card">
            <h3>Solara</h3>
            <a href="solara.zip" download class="dl-btn">
                <i class="fas fa-download"></i> DOWNLOAD
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 GETGOODHACK HUB
    </footer>

    <script>
        function openTab(tabId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>

</body>
</html>
